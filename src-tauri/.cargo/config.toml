# ── Environment variables for build scripts (cc crate, ring, etc.) ──
# The `ring` crate uses the `cc` crate to compile C/assembly for crypto.
# The `cc` crate looks for `CC_<target>` and `AR_<target>` env vars.
# Without these it tries to guess the cross-compiler name (e.g.
# `arm-linux-androideabi-clang`) which does NOT match the NDK's actual
# naming scheme (`armv7a-linux-androideabi24-clang.cmd`).
[env]
CC_aarch64_linux_android = "C:\\Users\\user\\AppData\\Local\\Android\\Sdk\\ndk\\27.3.13750724\\toolchains\\llvm\\prebuilt\\windows-x86_64\\bin\\aarch64-linux-android24-clang.cmd"
