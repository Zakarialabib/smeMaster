name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint src

      - name: Frontend tests
        run: npx vitest run --exclude integration

      # Main app: check + test without ML sidecar (no protoc needed)
      - name: Rust check (core app only)
        run: cargo check -p smemaster
        working-directory: src-tauri

      - name: Rust tests (core app only)
        run: cargo test -p smemaster
        working-directory: src-tauri

      - name: Vite build
        run: npm run build

  # Separate job: build the ML sidecar (requires protoc)
  build-ml-sidecar:
    runs-on: windows-latest
    # Only run on push to main/dev (not on every PR)
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install protoc
        run: choco install protoc

      - name: Build ML sidecar
        run: cargo build -p ml-sidecar --release
        working-directory: src-tauri

      - name: Copy to binaries/
        run: |
          mkdir -p src-tauri/binaries
          cp target/release/ml-sidecar.exe src-tauri/binaries/ml-sidecar-x86_64-pc-windows-msvc.exe

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-sidecar-windows
          path: src-tauri/binaries/
