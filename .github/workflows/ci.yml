name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: TypeScript check
        run: npx tsc --noEmit
      
      - name: ESLint
        run: npx eslint src
      
      - name: Frontend tests
        run: npx vitest run --exclude integration
      
      - name: Rust check
        run: cargo check
        working-directory: src-tauri
      
      - name: Rust tests
        run: cargo test
        working-directory: src-tauri
      
      - name: Vite build
        run: npm run build