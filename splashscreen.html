<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMEMaster</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fafaf9;
        overflow: hidden;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }

      .splash-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 340px;
        padding: 40px 32px 36px;
        background: #fafaf9;
        border-radius: 12px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        animation: cardIn 0.35s ease-out forwards;
      }

      .wordmark {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: #1c1917;
        opacity: 0;
        animation: fadeSlide 0.4s ease-out 0.1s forwards;
      }

      .wordmark-accent {
        color: #4f46e5;
      }

      .wordmark-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #4f46e5;
        margin-top: 4px;
      }

      .tagline {
        font-size: 13px;
        font-weight: 400;
        color: #78716c;
        margin-top: 6px;
        letter-spacing: 0.3px;
        opacity: 0;
        animation: fadeSlide 0.4s ease-out 0.2s forwards;
      }

      .progress-container {
        width: 220px;
        margin-top: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        opacity: 0;
        animation: fadeSlide 0.4s ease-out 0.3s forwards;
      }

      .progress-bar-bg {
        width: 100%;
        height: 3px;
        background: rgba(0, 0, 0, 0.06);
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 10px;
      }

      .progress-bar-fill {
        height: 100%;
        background: #4f46e5;
        width: 0%;
        transition: width 0.3s ease;
        border-radius: 2px;
        box-shadow: 0 0 8px rgba(79, 70, 229, 0.4);
      }

      .status-text {
        color: #57534e;
        font-size: 11.5px;
        text-align: center;
        letter-spacing: 0.4px;
        font-weight: 500;
        transition: opacity 0.3s;
      }

      @keyframes cardIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="splash-card">
      <div class="wordmark">
        <span class="wordmark-accent">SME</span>Master
        <span class="wordmark-dot"></span>
      </div>
      <div class="tagline">Your Mail &amp; CRM</div>

      <div class="progress-container" id="progressContainer">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="status-text" id="statusText">Awakening systems...</div>
      </div>
    </div>

    <script type="module">
      import { invoke } from "@tauri-apps/api/core";
      import { listen } from "@tauri-apps/api/event";

      const progressBar = document.getElementById("progressBar");
      const statusText = document.getElementById("statusText");
      const progressContainer = document.getElementById("progressContainer");

      let currentProgress = 0;
      let autoProgress = 0;
      let readyFired = false;

      function closeSplash() {
        if (readyFired) return;
        readyFired = true;
        clearInterval(autoInterval);
        progressBar.style.width = "100%";
        statusText.textContent = "Ready";

        // Smooth transition out
        progressContainer.style.opacity = "0";
        setTimeout(() => {
          invoke("close_splashscreen").catch((err) => {
            console.error("close_splashscreen failed:", err);
          });
        }, 300);
      }

      // Immediate auto-progress animation — bar never stays at 0%
      const autoInterval = setInterval(() => {
        autoProgress = Math.min(autoProgress + 2, 85);
        if (autoProgress > currentProgress) {
          progressBar.style.width = `${autoProgress}%`;
        }
        if (autoProgress >= 85) clearInterval(autoInterval);
      }, 400);

      document.addEventListener("DOMContentLoaded", () => {
        console.log("Splashscreen loaded", {
          hasTauri: !!invoke,
          hasEvent: !!listen,
        });

        listen("init:progress", (event) => {
          const payload = event.payload;
          if (payload) {
            if (payload.percentage !== undefined) {
              currentProgress = payload.percentage;
              if (payload.percentage > autoProgress) {
                progressBar.style.width = `${payload.percentage}%`;
              }
            }
            if (payload.message) {
              statusText.textContent = payload.message;
            }
          }
        }).catch((err) => {
          console.warn("Failed to listen for init:progress", err);
        });

        listen("init:ready", closeSplash).catch((err) => {
          console.warn("Failed to listen for init:ready", err);
        });

        // Auto-close after 8 seconds — the splash is just visual now
        setTimeout(() => {
          if (!readyFired) {
            closeSplash();
          }
        }, 8000);
      });
    </script>
  </body>
</html>
