id: com.smemaster.app
runtime: org.freedesktop.Sdk
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: smemaster
finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --share=network
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
  - --system-talk-name=org.freedesktop.NetworkManager

modules:
  - name: smemaster
    buildsystem: simple
    build-commands:
      - cargo build --release --manifest-path src-tauri/Cargo.toml
      - cp src-tauri/target/release/smemaster /app/bin/
      - install -Dm644 com.smemaster.app.desktop /app/share/applications/com.smemaster.app.desktop
      - install -Dm644 com.smemaster.app.metainfo.xml /app/share/metainfo/com.smemaster.app.metainfo.xml
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.smemaster.app.png
      - install -Dm644 src-tauri/icons/64x64.png /app/share/icons/hicolor/64x64/apps/com.smemaster.app.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.smemaster.app.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/com.smemaster.app.png
      - install -Dm644 src-tauri/icons/icon.png /app/share/icons/hicolor/512x512/apps/com.smemaster.app.png

    sources:
      - type: dir
        path: ..
        dest: smemaster
